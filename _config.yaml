# NeuroFocus Configuration File

# Camera settings
camera:
  index: 0
  width: 640
  height: 480
  fps: 30

# Face detection
face:
  min_detection_confidence: 0.5
  yaw_threshold: 40
  pitch_offset: 5.0
  pitch_threshold_min: 0.0
  pitch_threshold_max: 30.0

# Fatigue detection
fatigue:
  window_size_seconds: 30
  ear_threshold_closed: 0.2
  ear_threshold_normal: 0.35
  mar_threshold_yawn: 0.6
  fatigue_severe_threshold: 80
  fatigue_moderate_threshold: 60
  fatigue_mild_threshold: 40

# Posture detection
posture:
  window_size_seconds: 5
  bad_posture_threshold: 0.15
  head_forward_threshold: 0.08
  posture_time_trigger: 1.0

# Gesture control
gesture:
  enabled: false
  sensitivity: 1.0
  min_detection_confidence: 0.7
  max_hands: 1

# Calibration
calibration:
  auto_calibrate: true
  samples_required: 20
  face_calibrated: false
  hand_calibrated: false

# Notifications
notifications:
  work_limit_minutes: 45
  posture_window_minutes: 3
  posture_bad_percent: 30
  yawn_limit: 3
  yawn_window_minutes: 10
  sound_enabled: true
  sound_volume: 0.5

# UI Settings
ui:
  theme: dark
  window_width: 1280
  window_height: 800

# Logging
logging:
  level: INFO
  file_enabled: true
  max_file_size_mb: 5
  backup_count: 5

# Pomodoro
pomodoro:
  work_minutes: 25
  break_minutes: 5
  enabled: false
